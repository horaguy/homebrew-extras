name: Bump Formula and Cask

on:
  schedule:
    - cron: "0 0 */3 * *" # every 3 days at midnight
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-slim
    permissions:
      contents: write
      # Also "Allow GitHub Actions to create and approve pull requests" is required on the repository settings
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # 'brew bump-formula-pr' and 'brew bump-cask-pr' require HOMEBREW_GITHUB_API_TOKEN
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: private-tap-github-token
        with:
          app-id: ${{ secrets.GITHUBAPP_ID }}
          private-key: ${{ secrets.GITHUBAPP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - run: echo "PRIVATE_TAP_GITHUB_TOKEN=${{ steps.private-tap-github-token.outputs.token }}" >> $GITHUB_ENV
      - uses: actions/checkout@v6
      - name: Configure Git name and email
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - run: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      - uses: Homebrew/actions/setup-homebrew@main
      - run: brew tap horaguy/extras
      - name: echo env
        run: echo PRIVATE_TAP_GITHUB_TOKEN="$PRIVATE_TAP_GITHUB_TOKEN"
      - name: Bump all casks
        run: |
          shopt -s nullglob # To prevent error when no cask files are found
          for cask_file in Casks/*.rb; do
            echo "Bumping $cask_file"
            cask=$(basename "$cask_file" .rb)
            .github/scripts/bump.sh "$cask" --cask
          done
      - name: Bump all formulas
        run: |
          shopt -s nullglob # To prevent error when no formula files are found
          for formula_file in Formula/*.rb; do
            echo "Bumping $formula_file"
            formula=$(basename "$formula_file" .rb)
            .github/scripts/bump.sh "$formula"
          done